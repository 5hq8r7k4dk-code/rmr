<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Apartment</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0d0d0f;
            --panel: #13131a;
            --border: rgba(255,255,255,0.07);
            --accent: #c8a96e;
            --accent-dim: rgba(200,169,110,0.15);
            --text: #f0ede8;
            --muted: #7a7670;
            --input-bg: #1a1a24;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 0;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 20% 80%, rgba(200,169,110,0.06) 0%, transparent 70%),
                radial-gradient(ellipse 50% 40% at 80% 20%, rgba(120,100,200,0.05) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* Nav */
        nav {
            width: 100%;
            background: #0a0a0c;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 4px;
            padding: 10px 20px;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        nav .nav-right {
            margin-left: auto;
        }

        nav a {
            color: var(--muted);
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 5px;
            font-size: 14px;
            transition: background 0.2s, color 0.2s;
        }

        nav a:hover {
            background: rgba(255,255,255,0.06);
            color: var(--text);
        }

        nav a.active {
            background: var(--accent-dim);
            color: var(--accent);
        }

        nav a.login {
            background: var(--accent);
            color: #0d0d0f;
            font-weight: 500;
        }

        nav a.login:hover {
            opacity: 0.9;
        }

        /* Page content */
        .page-content {
            padding: 48px 20px;
            width: 100%;
            display: flex;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .container {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 480px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.03);
            animation: fadeUp 0.6s cubic-bezier(.22,1,.36,1) both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .header {
            padding: 18px 24px;
            font-family: 'DM Serif Display', serif;
            font-size: 22px;
            font-weight: 400;
            border-bottom: 1px solid var(--border);
            border-radius: 16px 16px 0 0;
            color: var(--text);
            letter-spacing: -0.3px;
        }

        .person-row {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        .person-row:last-child {
            border-bottom: none;
            border-radius: 0 0 16px 16px;
        }

        .person-name {
            width: 110px;
            font-size: 15px;
            color: var(--text);
            font-weight: 400;
        }

        .rate-btn {
            flex: 1;
            padding: 8px 14px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s, border-color 0.2s;
        }

        .rate-btn:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.14);
        }

        .rate-btn.disabled {
            background: transparent;
            color: var(--muted);
            cursor: default;
            border-color: rgba(255,255,255,0.04);
        }

        .status-col {
            width: 44px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-left: 12px;
        }

        .status-circle {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.15);
            background: transparent;
            transition: all 0.3s;
        }

        .status-circle.rated {
            background: #4CAF50;
            border-color: #4CAF50;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 11px;
            font-weight: bold;
        }

        .status-circle.rated::after {
            content: '✔';
        }

        .status-circle.self {
            border-color: rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.03);
        }

        /* Dropdown panel */
        .dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 4px);
            left: 110px;
            right: 56px;
            background: #16161f;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            z-index: 200;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .dropdown.open {
            display: block;
        }

        .dropdown-title {
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 14px;
            color: var(--muted);
        }

        .rating-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .rating-label {
            font-size: 13px;
            color: var(--text);
            width: 90px;
        }

        .stars {
            display: flex;
            gap: 2px;
        }

        .star-slot {
            position: relative;
            display: inline-block;
            width: 22px;
            height: 24px;
            cursor: pointer;
        }

        .star-bg {
            font-size: 22px;
            color: rgba(255,255,255,0.15);
            line-height: 1;
            display: block;
            user-select: none;
        }

        .star-fg {
            position: absolute;
            left: 0;
            top: 0;
            font-size: 22px;
            color: #c8a96e;
            line-height: 1;
            overflow: hidden;
            width: 0%;
            white-space: nowrap;
            display: block;
            pointer-events: none;
        }

        .half {
            position: absolute;
            top: 0;
            height: 100%;
            width: 50%;
            z-index: 1;
        }

        .half.left  { left: 0; }
        .half.right { right: 0; }

        .submit-btn {
            margin-top: 14px;
            width: 100%;
            padding: 9px;
            background: var(--accent);
            color: #0d0d0f;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            transition: opacity 0.2s, transform 0.15s;
        }

        .submit-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        footer {
            width: 100%;
            text-align: center;
            padding: 16px;
            font-size: 13px;
            color: var(--muted);
            background: #0a0a0c;
            border-top: 1px solid var(--border);
            margin-top: auto;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="apartment.html" class="active">Apartment</a>
        <a href="chat.html">Chat</a>
        <a href="finding.html">Find</a>
        <a href="login.html" class="login nav-right">Login</a>
    </nav>
    <div class="page-content">
    <div class="container">
    <div class="header">RateMyRoommate</div>

    <!-- Search -->
    <div style="padding:16px 20px;">
        <input 
            type="text" 
            id="search" 
            placeholder="Search apartments..."
            style="width:100%; padding:10px; border-radius:6px; border:1px solid #ccc;"
        >
    </div>

    <!-- Results -->
    <div id="results"></div>
    </div>
    </div>

    <footer style="width:100%; text-align:center; padding:16px; font-size:13px; color:#888; background:#f8f8f8; border-top:1px solid #e0e0e0; margin-top:auto;">
        &copy;RMR Team 2026
    </footer>

    <script>
const apartments = [
    {
        name: "Birch Plaza",
        units: ["101", "102", "201", "202"]
    },
    {
        name: "North Point",
        units: ["A1", "A2", "B1"]
    },
    {
        name: "The Cove",
        units: ["12", "14", "16"]
    },
    {
        name: "Sundance",
        units: ["1A", "1B", "2A", "2B"]
    },
    {
        name: "The Lodge",
        units: ["101", "102", "103", "201", "202"]
    },
    {
        name: "The Gates",
        units: ["Apt 1", "Apt 2", "Apt 3"]
    },
    {
        name: "The Heritage Apartments",
        units: ["Unit 1", "Unit 2", "Unit 3", "Unit 4"]
    },
    {
        name: "Bunkhouse Apartments",
        units: ["101", "102", "201", "202", "301", "302"]
    },
    {
        name: "Cedars",
        units: ["A1", "A2", "B1", "B2", "C1"]
    },
    {
        name: "Nauvoo Housing",
        units: ["Unit 1", "Unit 2", "Unit 3", "Unit 4", "Unit 5"]
    },
    {
        name: "Somerset",
        units: ["101", "102", "201", "202", "301", "302"]
    }
];

const searchInput = document.getElementById("search");
const results = document.getElementById("results");

function renderApartments(list) {
    results.innerHTML = "";

    list.forEach(apartment => {
        const aptDiv = document.createElement("div");
        aptDiv.className = "person-row";
        aptDiv.style.flexDirection = "column";
        aptDiv.style.alignItems = "flex-start";

        const title = document.createElement("div");
        title.textContent = apartment.name;
        title.style.fontWeight = "bold";
        title.style.marginBottom = "8px";

        const unitContainer = document.createElement("div");
        unitContainer.style.display = "flex";
        unitContainer.style.flexWrap = "wrap";
        unitContainer.style.gap = "6px";

        apartment.units.forEach(unit => {
            const btn = document.createElement("button");
            btn.textContent = "Unit " + unit;
            btn.style.padding = "6px 10px";
            btn.style.border = "1px solid #bbb";
            btn.style.borderRadius = "6px";
            btn.style.background = "white";
            btn.style.cursor = "pointer";

            btn.addEventListener("click", () => {
                // Redirect to apartment page with params
                window.location.href = `apartment.html?apt=${encodeURIComponent(apartment.name)}&unit=${unit}`;
            });

            unitContainer.appendChild(btn);
        });

        aptDiv.appendChild(title);
        aptDiv.appendChild(unitContainer);
        results.appendChild(aptDiv);
    });
}

// Initial render
renderApartments(apartments);

// Search filter
searchInput.addEventListener("input", () => {
    const value = searchInput.value.toLowerCase();

    const filtered = apartments.filter(a =>
        a.name.toLowerCase().includes(value)
    );

    renderApartments(filtered);
});
</script>
