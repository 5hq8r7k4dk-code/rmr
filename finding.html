<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Apartment</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f2f2f2;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
            min-height: 100vh;
        }

        nav {
            width: 100%;
            background: #333;
            display: flex;
            gap: 4px;
            padding: 10px 20px;
            align-items: center;
        }

        nav .nav-right {
            margin-left: auto;
        }

        nav a.login {
            background: #4a90d9;
            color: white;
        }

        nav a.login:hover {
            background: #357abd;
        }

        nav a {
            color: #ddd;
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 5px;
            font-size: 14px;
            transition: background 0.2s, color 0.2s;
        }

        nav a:hover {
            background: #555;
            color: white;
        }

        nav a.active {
            background: #4a90d9;
            color: white;
        }

        .page-content {
            padding: 40px 20px;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .container {
            background: white;
            border: 2px solid #ccc;
            border-radius: 10px;
            width: 480px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }

        .header {
            padding: 16px 24px;
            font-size: 22px;
            font-weight: bold;
            border-bottom: 2px solid #ccc;
            background: #f8f8f8;
            border-radius: 10px 10px 0 0;
        }

        .person-row {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            border-bottom: 1px solid #e0e0e0;
            position: relative;
        }

        .person-row:last-child {
            border-bottom: none;
            border-radius: 0 0 10px 10px;
        }

        .person-name {
            width: 110px;
            font-size: 16px;
            color: #333;
        }

        .rate-btn {
            flex: 1;
            padding: 8px 14px;
            background: white;
            border: 1px solid #bbb;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }

        .rate-btn:hover {
            background: #f5f5f5;
        }

        .rate-btn.disabled {
            background: #f5f5f5;
            color: #aaa;
            cursor: default;
            border-color: #e0e0e0;
        }

        .status-col {
            width: 44px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-left: 12px;
        }

        .status-circle {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid #bbb;
            background: white;
            transition: all 0.3s;
        }

        .status-circle.rated {
            background: #4CAF50;
            border-color: #4CAF50;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 13px;
            font-weight: bold;
        }

        .status-circle.rated::after {
            content: '✔';
        }

        .status-circle.self {
            border-color: #e0e0e0;
            background: #f5f5f5;
        }

        /* Dropdown panel */
        .dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 4px);
            left: 110px;
            right: 56px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 14px;
            z-index: 200;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .dropdown.open {
            display: block;
        }

        .dropdown-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 12px;
            color: #333;
        }

        .rating-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .rating-label {
            font-size: 13px;
            color: #555;
            width: 90px;
        }

        .stars {
            display: flex;
            gap: 2px;
        }

        .star {
            font-size: 22px;
            cursor: pointer;
            color: #ddd;
            transition: color 0.15s;
            line-height: 1;
        }

        .submit-btn {
            margin-top: 12px;
            width: 100%;
            padding: 8px;
            background: #4a90d9;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: background 0.2s;
        }

        .submit-btn:hover {
            background: #357abd;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="apartment.html" class="active">Apartment</a>
        <a href="chat.html">Chat</a>
        <a href="finding.html">Find</a>
        <a href="login.html" class="login nav-right">Login</a>
    </nav>
    <div class="page-content">
    <div class="container">
    <div class="header">RateMyRoommate</div>

    <!-- Search -->
    <div style="padding:16px 20px;">
        <input 
            type="text" 
            id="search" 
            placeholder="Search apartments..."
            style="width:100%; padding:10px; border-radius:6px; border:1px solid #ccc;"
        >
    </div>

    <!-- Results -->
    <div id="results"></div>
    </div>
    </div>

    <footer style="width:100%; text-align:center; padding:16px; font-size:13px; color:#888; background:#f8f8f8; border-top:1px solid #e0e0e0; margin-top:auto;">
        &copy;RMR Team 2026
    </footer>

    <script>
const apartments = [
    {
        name: "Pine View Apartments",
        units: ["101", "102", "201", "202"]
    },
    {
        name: "Mountain Ridge",
        units: ["A1", "A2", "B1"]
    },
    {
        name: "Campus Court",
        units: ["12", "14", "16"]
    }
];

const searchInput = document.getElementById("search");
const results = document.getElementById("results");

function renderApartments(list) {
    results.innerHTML = "";

    list.forEach(apartment => {
        const aptDiv = document.createElement("div");
        aptDiv.className = "person-row";
        aptDiv.style.flexDirection = "column";
        aptDiv.style.alignItems = "flex-start";

        const title = document.createElement("div");
        title.textContent = apartment.name;
        title.style.fontWeight = "bold";
        title.style.marginBottom = "8px";

        const unitContainer = document.createElement("div");
        unitContainer.style.display = "flex";
        unitContainer.style.flexWrap = "wrap";
        unitContainer.style.gap = "6px";

        apartment.units.forEach(unit => {
            const btn = document.createElement("button");
            btn.textContent = "Unit " + unit;
            btn.style.padding = "6px 10px";
            btn.style.border = "1px solid #bbb";
            btn.style.borderRadius = "6px";
            btn.style.background = "white";
            btn.style.cursor = "pointer";

            btn.addEventListener("click", () => {
                // Redirect to rating page with params
                window.location.href = `rating.html?apt=${encodeURIComponent(apartment.name)}&unit=${unit}`;
            });

            unitContainer.appendChild(btn);
        });

        aptDiv.appendChild(title);
        aptDiv.appendChild(unitContainer);
        results.appendChild(aptDiv);
    });
}

// Initial render
renderApartments(apartments);

// Search filter
searchInput.addEventListener("input", () => {
    const value = searchInput.value.toLowerCase();

    const filtered = apartments.filter(a =>
        a.name.toLowerCase().includes(value)
    );

    renderApartments(filtered);
});
</script>
