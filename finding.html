<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find an Apartment</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <nav>
        <img src="images/nav_logo.png" alt="Logo" style="height:32px; margin-right:8px;">
        <a href="index.html">Home</a>
        <a href="apartment.html">Apartment</a>
        <a href="studentchat.html">Chat</a>
        <a href="finding.html" class="active">Find</a>
        <a href="login.html" class="login nav-right">Login</a>
    </nav>
    <div class="page-content">
        <div class="container">
            <div class="header">RateMyRoommate</div>
            <div class="search-wrap">
                <input type="text" id="search" placeholder="Search apartments..." class="search-input">
            </div>
            <div id="results"></div>
        </div>
    </div>

    <footer>&copy; RMR Team 2026</footer>

    <script>
const apartments = [
    { name: "Birch Plaza",            units: ["101", "102", "201", "202"] },
    { name: "North Point",            units: ["A1", "A2", "B1"] },
    { name: "The Cove",               units: ["12", "14", "16"] },
    { name: "Sundance",               units: ["1A", "1B", "2A", "2B"] },
    { name: "The Lodge",              units: ["101", "102", "103", "201", "202"] },
    { name: "The Gates",              units: ["Apt 1", "Apt 2", "Apt 3"] },
    { name: "The Heritage Apartments",units: ["Unit 1", "Unit 2", "Unit 3", "Unit 4"] },
    { name: "Bunkhouse Apartments",   units: ["101", "102", "201", "202", "301", "302"] },
    { name: "Cedars",                 units: ["A1", "A2", "B1", "B2", "C1"] },
    { name: "Nauvoo Housing",         units: ["Unit 1", "Unit 2", "Unit 3", "Unit 4", "Unit 5"] },
    { name: "Somerset",               units: ["101", "102", "201", "202", "301", "302"] }
];

const searchInput = document.getElementById("search");
const results = document.getElementById("results");

function renderApartments(list) {
    results.innerHTML = "";

    list.forEach(apartment => {
        const aptDiv = document.createElement("div");
        aptDiv.className = "person-row apt-listing";

        const title = document.createElement("div");
        title.className = "apt-title";
        title.textContent = apartment.name;

        const unitContainer = document.createElement("div");
        unitContainer.className = "unit-container";

        apartment.units.forEach(unit => {
            const btn = document.createElement("button");
            btn.textContent = "Unit " + unit;
            btn.className = "unit-btn";
            btn.addEventListener("click", () => {
                window.location.href = `apartment.html?apt=${encodeURIComponent(apartment.name)}&unit=${unit}`;
            });
            unitContainer.appendChild(btn);
        });

        aptDiv.appendChild(title);
        aptDiv.appendChild(unitContainer);
        results.appendChild(aptDiv);
    });
}

renderApartments(apartments);

searchInput.addEventListener("input", () => {
    const value = searchInput.value.toLowerCase();
    renderApartments(apartments.filter(a => a.name.toLowerCase().includes(value)));
});
    </script>
</body>
</html>
