<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles/style.css">
</head>
<body class="centered-layout">
  <div class="wrapper">
    <div class="login-panel">
      <div class="login-header">
        <h1>Create account</h1>
        <p>Join us — it only takes a moment</p>
      </div>

      <form onsubmit="handleSignup(event)">
        <div class="form-group">
          <label for="name">Full Name</label>
          <div class="input-wrap">
            <input type="text" id="name" placeholder="Jane Smith" autocomplete="name" required />
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <div class="input-wrap">
            <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/>
            </svg>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <input type="password" id="password" placeholder="••••••••" autocomplete="new-password" required />
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </div>
        </div>

        <button type="submit" class="btn-primary">Create account</button>
      </form>

      <p class="terms">By signing up you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.</p>

      <div class="auth-link">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </div>

  <script>
    function handleSignup(e) {
      e.preventDefault();
      const btn = e.target.querySelector('.btn-primary');
      btn.textContent = 'Creating account…';
      btn.style.opacity = '0.7';
      btn.disabled = true;
      setTimeout(() => {
        btn.textContent = '✓ Account created!';
        btn.style.background = '#4caf80';
      }, 1200);
    }
  </script>
</body>
</html>
