<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --panel: #13131a;
      --border: rgba(255,255,255,0.07);
      --accent: #c8a96e;
      --accent-dim: rgba(200,169,110,0.15);
      --text: #f0ede8;
      --muted: #7a7670;
      --input-bg: #1a1a24;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 80%, rgba(200,169,110,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 20%, rgba(120,100,200,0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    .wrapper {
      width: 440px;
      max-width: 95vw;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 40px 100px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03);
      padding: 48px 44px;
      animation: fadeUp 0.7s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-header {
      margin-bottom: 32px;
      animation: fadeUp 0.7s 0.1s cubic-bezier(.22,1,.36,1) both;
    }

    .login-header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      font-weight: 400;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .login-header p {
      font-size: 14px;
      color: var(--muted);
      font-weight: 300;
    }

    .form-group {
      margin-bottom: 18px;
      animation: fadeUp 0.7s 0.2s cubic-bezier(.22,1,.36,1) both;
    }

    .form-group:nth-child(2) { animation-delay: 0.25s; }
    .form-group:nth-child(3) { animation-delay: 0.3s; }
    .form-group:nth-child(4) { animation-delay: 0.35s; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      transition: color 0.2s;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 14px 13px 42px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input::placeholder { color: var(--muted); }

    input:focus {
      border-color: rgba(200,169,110,0.5);
      box-shadow: 0 0 0 3px rgba(200,169,110,0.08);
    }

    input:focus ~ svg,
    .input-wrap:focus-within svg {
      color: var(--accent);
    }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #0d0d0f;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.03em;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.15s;
      animation: fadeUp 0.7s 0.45s cubic-bezier(.22,1,.36,1) both;
    }

    .btn-submit:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-submit:active { transform: translateY(0); }

    .login-link {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      margin-top: 22px;
      animation: fadeUp 0.7s 0.5s cubic-bezier(.22,1,.36,1) both;
    }

    .login-link a {
      color: var(--accent);
      text-decoration: none;
      opacity: 0.8;
      transition: opacity 0.2s;
    }
    .login-link a:hover { opacity: 1; }

    .terms {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      margin-top: 14px;
      line-height: 1.6;
      animation: fadeUp 0.7s 0.5s cubic-bezier(.22,1,.36,1) both;
    }

    .terms a {
      color: var(--accent);
      text-decoration: none;
      opacity: 0.7;
    }
    .terms a:hover { opacity: 1; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="login-header">
      <h1>Create account</h1>
      <p>Join us — it only takes a moment</p>
    </div>

    <form onsubmit="handleSignup(event)">
      <div class="form-group">
        <label for="name">Full Name</label>
        <div class="input-wrap">
          <input type="text" id="name" placeholder="Jane Smith" autocomplete="name" required />
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <div class="input-wrap">
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/>
          </svg>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="••••••••" autocomplete="new-password" required />
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
      </div>

      <button type="submit" class="btn-submit">Create account</button>
    </form>

    <p class="terms">By signing up you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.</p>

    <div class="login-link">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>

  <script>
    function handleSignup(e) {
      e.preventDefault();
      const btn = e.target.querySelector('.btn-submit');
      btn.textContent = 'Creating account…';
      btn.style.opacity = '0.7';
      btn.disabled = true;
      setTimeout(() => {
        btn.textContent = '✓ Account created!';
        btn.style.background = '#4caf80';
      }, 1200);
    }
  </script>
</body>
</html>
