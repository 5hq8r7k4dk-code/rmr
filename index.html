<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f2f2f2;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        nav {
            width: 100%;
            background: #333;
            display: flex;
            gap: 4px;
            padding: 10px 20px;
            align-items: center;
        }

        nav .nav-right { margin-left: auto; }

        nav a {
            color: #ddd;
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 5px;
            font-size: 14px;
            transition: background 0.2s, color 0.2s;
        }

        nav a:hover { background: #555; color: white; }
        nav a.active { background: #4a90d9; color: white; }
        nav a.login { background: #4a90d9; color: white; }
        nav a.login:hover { background: #357abd; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="active">Home</a>
        <a href="apartment.html">Apartment</a>
        <a href="chat.html">Chat</a>
        <a href="finding.html">Find</a>
        <a href="login.html" class="login nav-right">Login</a>
    </nav>
    Home Page
</body>
</html>
