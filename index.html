<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0d0d0f;
            --panel: #13131a;
            --border: rgba(255,255,255,0.07);
            --accent: #c8a96e;
            --accent-dim: rgba(200,169,110,0.15);
            --text: #f0ede8;
            --muted: #7a7670;
            --input-bg: #1a1a24;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 0;
        }

        /* Nav */
        nav {
            width: 100%;
            background: #1a2540;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 4px;
            padding: 10px 20px;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        nav .nav-right {
            margin-left: auto;
        }

        nav a {
            color: var(--muted);
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 5px;
            font-size: 14px;
            transition: background 0.2s, color 0.2s;
        }

        nav a:hover {
            background: rgba(255,255,255,0.06);
            color: var(--text);
        }

        nav a.active {
            background: var(--accent-dim);
            color: var(--accent);
        }

        nav a.login {
            background: var(--accent);
            color: #0d0d0f;
            font-weight: 500;
        }

        nav a.login:hover {
            opacity: 0.9;
        }

        /* Hero */
        .hero {
            flex: 1;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url('images/fancy_logo.png') center center / cover no-repeat;
            min-height: calc(100vh - 53px);
        }
    </style>
</head>
<body>
    <nav>
        <img src="images/nav_logo.png" alt="Logo" style="height:32px; margin-right:8px;">
        <a href="index.html" class="active">Home</a>
        <a href="apartment.html">Apartment</a>
        <a href="studentchat.html">Chat</a>
        <a href="finding.html">Find</a>
        <a href="login.html" class="login nav-right">Login</a>
    </nav>
    <div class="hero"></div>
</body>
</html>
