<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Apartment</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0d0d0f;
            --panel: #13131a;
            --border: rgba(255,255,255,0.07);
            --accent: #c8a96e;
            --accent-dim: rgba(200,169,110,0.15);
            --text: #f0ede8;
            --muted: #7a7670;
            --input-bg: #1a1a24;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 0;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 20% 80%, rgba(200,169,110,0.06) 0%, transparent 70%),
                radial-gradient(ellipse 50% 40% at 80% 20%, rgba(120,100,200,0.05) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* Nav */
        nav {
            width: 100%;
            background: #0a0a0c;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 4px;
            padding: 10px 20px;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        nav .nav-right {
            margin-left: auto;
        }

        nav a {
            color: var(--muted);
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 5px;
            font-size: 14px;
            transition: background 0.2s, color 0.2s;
        }

        nav a:hover {
            background: rgba(255,255,255,0.06);
            color: var(--text);
        }

        nav a.active {
            background: var(--accent-dim);
            color: var(--accent);
        }

        nav a.login {
            background: var(--accent);
            color: #0d0d0f;
            font-weight: 500;
        }

        nav a.login:hover {
            opacity: 0.9;
        }

        /* Page content */
        .page-content {
            padding: 48px 20px;
            width: 100%;
            display: flex;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .container {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 480px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.03);
            animation: fadeUp 0.6s cubic-bezier(.22,1,.36,1) both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .header {
            padding: 18px 24px;
            font-family: 'DM Serif Display', serif;
            font-size: 22px;
            font-weight: 400;
            border-bottom: 1px solid var(--border);
            border-radius: 16px 16px 0 0;
            color: var(--text);
            letter-spacing: -0.3px;
        }

        .person-row {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        .person-row:last-child {
            border-bottom: none;
            border-radius: 0 0 16px 16px;
        }

        .person-name {
            width: 110px;
            font-size: 15px;
            color: var(--text);
            font-weight: 400;
        }

        .rate-btn {
            flex: 1;
            padding: 8px 14px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s, border-color 0.2s;
        }

        .rate-btn:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.14);
        }

        .rate-btn.disabled {
            background: transparent;
            color: var(--muted);
            cursor: default;
            border-color: rgba(255,255,255,0.04);
        }

        .status-col {
            width: 44px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-left: 12px;
        }

        .status-circle {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.15);
            background: transparent;
            transition: all 0.3s;
        }

        .status-circle.rated {
            background: #4CAF50;
            border-color: #4CAF50;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 11px;
            font-weight: bold;
        }

        .status-circle.rated::after {
            content: '✔';
        }

        .status-circle.self {
            border-color: rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.03);
        }

        /* Dropdown panel */
        .dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 4px);
            left: 110px;
            right: 56px;
            background: #16161f;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            z-index: 200;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .dropdown.open {
            display: block;
        }

        .dropdown-title {
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 14px;
            color: var(--muted);
        }

        .rating-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .rating-label {
            font-size: 13px;
            color: var(--text);
            width: 90px;
        }

        .stars {
            display: flex;
            gap: 2px;
        }

        .star {
            font-size: 22px;
            cursor: pointer;
            color: rgba(255,255,255,0.15);
            transition: color 0.15s;
            line-height: 1;
        }

        .submit-btn {
            margin-top: 14px;
            width: 100%;
            padding: 9px;
            background: var(--accent);
            color: #0d0d0f;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            transition: opacity 0.2s, transform 0.15s;
        }

        .submit-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        footer {
            width: 100%;
            text-align: center;
            padding: 16px;
            font-size: 13px;
            color: var(--muted);
            background: #0a0a0c;
            border-top: 1px solid var(--border);
            margin-top: auto;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="apartment.html" class="active">Apartment</a>
        <a href="chat.html">Chat</a>
        <a href="login.html" class="login nav-right">Login</a>
    </nav>
    <div class="page-content">
        <div class="container">
            <div class="header">Your Apartment</div>
            <div id="people-list"></div>
        </div>
    </div>

    <footer>&copy; RMR Team 2026</footer>

    <script>
        const people = ['Joe', 'Henry', 'Bobbert the Third', 'Nick', 'Richard'];
        const categories = ['Cleanliness', 'Noise', 'Social', 'Sleep'];
        const ratings = {};
        let openDropdown = null;

        people.forEach(person => { ratings[person] = {}; });

        function buildRows() {
            const list = document.getElementById('people-list');
            people.forEach(person => {
                const isYou = person === 'You';
                const row = document.createElement('div');
                row.className = 'person-row';

                // Name
                const nameDiv = document.createElement('div');
                nameDiv.className = 'person-name';
                nameDiv.textContent = person;
                row.appendChild(nameDiv);

                // Rate button
                const btn = document.createElement('button');
                btn.className = isYou ? 'rate-btn disabled' : 'rate-btn';
                btn.innerHTML = isYou ? '<span>You</span>' : '<span>Rate</span><span>▼</span>';
                btn.disabled = isYou;
                if (!isYou) btn.onclick = () => toggleDropdown(person);
                row.appendChild(btn);

                // Status circle
                const statusCol = document.createElement('div');
                statusCol.className = 'status-col';
                const circle = document.createElement('div');
                circle.className = isYou ? 'status-circle self' : 'status-circle';
                circle.id = `status-${person}`;
                statusCol.appendChild(circle);
                row.appendChild(statusCol);

                // Dropdown
                if (!isYou) {
                    const dropdown = document.createElement('div');
                    dropdown.className = 'dropdown';
                    dropdown.id = `dropdown-${person}`;

                    const title = document.createElement('div');
                    title.className = 'dropdown-title';
                    title.textContent = `Rate ${person}`;
                    dropdown.appendChild(title);

                    categories.forEach(cat => {
                        const ratingRow = document.createElement('div');
                        ratingRow.className = 'rating-row';

                        const label = document.createElement('div');
                        label.className = 'rating-label';
                        label.textContent = cat;
                        ratingRow.appendChild(label);

                        const stars = document.createElement('div');
                        stars.className = 'stars';
                        stars.id = `stars-${person}-${cat}`;

                        for (let i = 1; i <= 5; i++) {
                            const star = document.createElement('span');
                            star.className = 'star';
                            star.textContent = '★';
                            star.onclick = () => setRating(person, cat, i);
                            star.onmouseover = () => highlightStars(person, cat, i);
                            star.onmouseout = () => restoreStars(person, cat);
                            stars.appendChild(star);
                        }

                        ratingRow.appendChild(stars);
                        dropdown.appendChild(ratingRow);
                    });

                    const submitBtn = document.createElement('button');
                    submitBtn.className = 'submit-btn';
                    submitBtn.textContent = 'Submit Rating';
                    submitBtn.onclick = () => submitRating(person);
                    dropdown.appendChild(submitBtn);

                    row.appendChild(dropdown);
                }

                list.appendChild(row);
            });
        }

        function toggleDropdown(person) {
            const dropdown = document.getElementById(`dropdown-${person}`);
            if (openDropdown && openDropdown !== dropdown) {
                openDropdown.classList.remove('open');
            }
            dropdown.classList.toggle('open');
            openDropdown = dropdown.classList.contains('open') ? dropdown : null;
        }

        function setRating(person, cat, value) {
            ratings[person][cat] = value;
            updateStarDisplay(person, cat, value);
        }

        function highlightStars(person, cat, value) {
            const container = document.getElementById(`stars-${person}-${cat}`);
            container.querySelectorAll('.star').forEach((star, i) => {
                star.style.color = i < value ? '#c8a96e' : 'rgba(255,255,255,0.15)';
            });
        }

        function restoreStars(person, cat) {
            updateStarDisplay(person, cat, ratings[person][cat] || 0);
        }

        function updateStarDisplay(person, cat, value) {
            const container = document.getElementById(`stars-${person}-${cat}`);
            container.querySelectorAll('.star').forEach((star, i) => {
                star.style.color = i < value ? '#c8a96e' : 'rgba(255,255,255,0.15)';
            });
        }

        function submitRating(person) {
            const allRated = categories.every(cat => ratings[person][cat]);
            if (!allRated) {
                alert('Please rate all 4 categories before submitting.');
                return;
            }
            document.getElementById(`status-${person}`).classList.add('rated');
            document.getElementById(`dropdown-${person}`).classList.remove('open');
            openDropdown = null;
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', e => {
            if (openDropdown && !e.target.closest('.person-row')) {
                openDropdown.classList.remove('open');
                openDropdown = null;
            }
        });

        buildRows();
    </script>
</body>
</html>
