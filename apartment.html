<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Apartment</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f2f2f2;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
            min-height: 100vh;
        }

        nav {
            width: 100%;
            background: #333;
            display: flex;
            gap: 4px;
            padding: 10px 20px;
            align-items: center;
        }

        nav .nav-right {
            margin-left: auto;
        }

        nav a.login {
            background: #4a90d9;
            color: white;
        }

        nav a.login:hover {
            background: #357abd;
        }

        nav a {
            color: #ddd;
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 5px;
            font-size: 14px;
            transition: background 0.2s, color 0.2s;
        }

        nav a:hover {
            background: #555;
            color: white;
        }

        nav a.active {
            background: #4a90d9;
            color: white;
        }

        .page-content {
            padding: 40px 20px;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .container {
            background: white;
            border: 2px solid #ccc;
            border-radius: 10px;
            width: 480px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }

        .header {
            padding: 16px 24px;
            font-size: 22px;
            font-weight: bold;
            border-bottom: 2px solid #ccc;
            background: #f8f8f8;
            border-radius: 10px 10px 0 0;
        }

        .person-row {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            border-bottom: 1px solid #e0e0e0;
            position: relative;
        }

        .person-row:last-child {
            border-bottom: none;
            border-radius: 0 0 10px 10px;
        }

        .person-name {
            width: 110px;
            font-size: 16px;
            color: #333;
        }

        .rate-btn {
            flex: 1;
            padding: 8px 14px;
            background: white;
            border: 1px solid #bbb;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }

        .rate-btn:hover {
            background: #f5f5f5;
        }

        .rate-btn.disabled {
            background: #f5f5f5;
            color: #aaa;
            cursor: default;
            border-color: #e0e0e0;
        }

        .status-col {
            width: 44px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-left: 12px;
        }

        .status-circle {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid #bbb;
            background: white;
            transition: all 0.3s;
        }

        .status-circle.rated {
            background: #4CAF50;
            border-color: #4CAF50;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 13px;
            font-weight: bold;
        }

        .status-circle.rated::after {
            content: '✔';
        }

        .status-circle.self {
            border-color: #e0e0e0;
            background: #f5f5f5;
        }

        /* Dropdown panel */
        .dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 4px);
            left: 110px;
            right: 56px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 14px;
            z-index: 200;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .dropdown.open {
            display: block;
        }

        .dropdown-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 12px;
            color: #333;
        }

        .rating-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .rating-label {
            font-size: 13px;
            color: #555;
            width: 90px;
        }

        .stars {
            display: flex;
            gap: 2px;
        }

        .star {
            font-size: 22px;
            cursor: pointer;
            color: #ddd;
            transition: color 0.15s;
            line-height: 1;
        }

        .submit-btn {
            margin-top: 12px;
            width: 100%;
            padding: 8px;
            background: #4a90d9;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: background 0.2s;
        }

        .submit-btn:hover {
            background: #357abd;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="apartment.html" class="active">Apartment</a>
        <a href="chat.html">Chat</a>
        <a href="rating.html">Rating</a>
        <a href="login.html" class="login nav-right">Login</a>
    </nav>
    <div class="page-content">
    <div class="container">
        <div class="header">Your Apartment:</div>
        <div id="people-list"></div>
    </div>
    </div>

    <footer style="width:100%; text-align:center; padding:16px; font-size:13px; color:#888; background:#f8f8f8; border-top:1px solid #e0e0e0; margin-top:auto;">
        &copy;RMR Team 2026
    </footer>

    <script>
        const people = ['Joe', 'Henry', 'Bobbert the Third', 'Nick', 'Richard'];
        const categories = ['Cleanliness', 'Noise', 'Social', 'Sleep'];
        const ratings = {};
        let openDropdown = null;

        people.forEach(person => { ratings[person] = {}; });

        function buildRows() {
            const list = document.getElementById('people-list');
            people.forEach(person => {
                const isYou = person === 'You';
                const row = document.createElement('div');
                row.className = 'person-row';

                // Name
                const nameDiv = document.createElement('div');
                nameDiv.className = 'person-name';
                nameDiv.textContent = person;
                row.appendChild(nameDiv);

                // Rate button
                const btn = document.createElement('button');
                btn.className = isYou ? 'rate-btn disabled' : 'rate-btn';
                btn.innerHTML = isYou ? '<span>You</span>' : '<span>Rate</span><span>▼</span>';
                btn.disabled = isYou;
                if (!isYou) btn.onclick = () => toggleDropdown(person);
                row.appendChild(btn);

                // Status circle
                const statusCol = document.createElement('div');
                statusCol.className = 'status-col';
                const circle = document.createElement('div');
                circle.className = isYou ? 'status-circle self' : 'status-circle';
                circle.id = `status-${person}`;
                statusCol.appendChild(circle);
                row.appendChild(statusCol);

                // Dropdown
                if (!isYou) {
                    const dropdown = document.createElement('div');
                    dropdown.className = 'dropdown';
                    dropdown.id = `dropdown-${person}`;

                    const title = document.createElement('div');
                    title.className = 'dropdown-title';
                    title.textContent = `Rate ${person}:`;
                    dropdown.appendChild(title);

                    categories.forEach(cat => {
                        const ratingRow = document.createElement('div');
                        ratingRow.className = 'rating-row';

                        const label = document.createElement('div');
                        label.className = 'rating-label';
                        label.textContent = cat;
                        ratingRow.appendChild(label);

                        const stars = document.createElement('div');
                        stars.className = 'stars';
                        stars.id = `stars-${person}-${cat}`;

                        for (let i = 1; i <= 5; i++) {
                            const star = document.createElement('span');
                            star.className = 'star';
                            star.textContent = '★';
                            star.onclick = () => setRating(person, cat, i);
                            star.onmouseover = () => highlightStars(person, cat, i);
                            star.onmouseout = () => restoreStars(person, cat);
                            stars.appendChild(star);
                        }

                        ratingRow.appendChild(stars);
                        dropdown.appendChild(ratingRow);
                    });

                    const submitBtn = document.createElement('button');
                    submitBtn.className = 'submit-btn';
                    submitBtn.textContent = 'Submit Rating';
                    submitBtn.onclick = () => submitRating(person);
                    dropdown.appendChild(submitBtn);

                    row.appendChild(dropdown);
                }

                list.appendChild(row);
            });
        }

        function toggleDropdown(person) {
            const dropdown = document.getElementById(`dropdown-${person}`);
            if (openDropdown && openDropdown !== dropdown) {
                openDropdown.classList.remove('open');
            }
            dropdown.classList.toggle('open');
            openDropdown = dropdown.classList.contains('open') ? dropdown : null;
        }

        function setRating(person, cat, value) {
            ratings[person][cat] = value;
            updateStarDisplay(person, cat, value);
        }

        function highlightStars(person, cat, value) {
            const container = document.getElementById(`stars-${person}-${cat}`);
            container.querySelectorAll('.star').forEach((star, i) => {
                star.style.color = i < value ? '#f5a623' : '#ddd';
            });
        }

        function restoreStars(person, cat) {
            updateStarDisplay(person, cat, ratings[person][cat] || 0);
        }

        function updateStarDisplay(person, cat, value) {
            const container = document.getElementById(`stars-${person}-${cat}`);
            container.querySelectorAll('.star').forEach((star, i) => {
                star.style.color = i < value ? '#f5a623' : '#ddd';
            });
        }

        function submitRating(person) {
            const allRated = categories.every(cat => ratings[person][cat]);
            if (!allRated) {
                alert('Please rate all 4 categories before submitting.');
                return;
            }
            document.getElementById(`status-${person}`).classList.add('rated');
            document.getElementById(`dropdown-${person}`).classList.remove('open');
            openDropdown = null;
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', e => {
            if (openDropdown && !e.target.closest('.person-row')) {
                openDropdown.classList.remove('open');
                openDropdown = null;
            }
        });

        buildRows();
    </script>
</body>
</html>
