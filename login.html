<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --panel: #13131a;
      --border: rgba(255,255,255,0.07);
      --accent: #c8a96e;
      --accent-dim: rgba(200,169,110,0.15);
      --text: #f0ede8;
      --muted: #7a7670;
      --input-bg: #1a1a24;
      --error: #e07070;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Ambient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 80%, rgba(200,169,110,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 20%, rgba(120,100,200,0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    .wrapper {
      display: flex;
      width: 440px;
      max-width: 95vw;
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 40px 100px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03);
      animation: fadeUp 0.7s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Left decorative panel */
    .side-panel {
      flex: 0 0 300px;
      background: linear-gradient(160deg, #1a1428 0%, #0f0f18 100%);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 40px 36px;
      position: relative;
      overflow: hidden;
    }

    .side-panel::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 220px; height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200,169,110,0.12), transparent 70%);
    }

    .side-panel::after {
      content: '';
      position: absolute;
      bottom: -80px; left: -40px;
      width: 260px; height: 260px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(120,80,200,0.08), transparent 70%);
    }

    .brand {
      position: relative;
      z-index: 1;
    }

    .brand-mark {
      width: 44px; height: 44px;
      background: var(--accent-dim);
      border: 1px solid rgba(200,169,110,0.3);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
      font-size: 20px;
    }

    .brand-name {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    .brand-tagline {
      font-size: 13px;
      color: var(--muted);
      margin-top: 8px;
      line-height: 1.5;
      font-weight: 300;
    }

    .testimonial {
      position: relative;
      z-index: 1;
    }

    .testimonial-quote {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 15px;
      color: rgba(240,237,232,0.6);
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .testimonial-author {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .author-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #8060c0);
      opacity: 0.7;
    }

    /* Right login form */
    .login-panel {
      flex: 1;
      background: var(--panel);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 48px 44px;
    }

    .login-header {
      margin-bottom: 36px;
      animation: fadeUp 0.7s 0.1s cubic-bezier(.22,1,.36,1) both;
    }

    .login-header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      font-weight: 400;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .login-header p {
      font-size: 14px;
      color: var(--muted);
      font-weight: 300;
    }

    .form-group {
      margin-bottom: 18px;
      animation: fadeUp 0.7s 0.2s cubic-bezier(.22,1,.36,1) both;
    }

    .form-group:nth-child(2) { animation-delay: 0.25s; }
    .form-group:nth-child(3) { animation-delay: 0.3s; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      transition: color 0.2s;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 14px 13px 42px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input::placeholder { color: var(--muted); }

    input:focus {
      border-color: rgba(200,169,110,0.5);
      box-shadow: 0 0 0 3px rgba(200,169,110,0.08);
    }

    input:focus + svg,
    .input-wrap:focus-within svg {
      color: var(--accent);
    }

    .form-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 26px;
      animation: fadeUp 0.7s 0.35s cubic-bezier(.22,1,.36,1) both;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 13px;
      color: var(--muted);
      user-select: none;
    }

    .remember input[type="checkbox"] { display: none; }

    .check-box {
      width: 16px; height: 16px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--input-bg);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }

    .remember input:checked ~ .check-box {
      background: var(--accent);
      border-color: var(--accent);
    }

    .remember input:checked ~ .check-box::after {
      content: '';
      width: 8px; height: 5px;
      border-left: 2px solid #0d0d0f;
      border-bottom: 2px solid #0d0d0f;
      transform: rotate(-45deg) translateY(-1px);
      display: block;
    }

    .forgot {
      font-size: 13px;
      color: var(--accent);
      text-decoration: none;
      opacity: 0.8;
      transition: opacity 0.2s;
    }
    .forgot:hover { opacity: 1; }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #0d0d0f;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      animation: fadeUp 0.7s 0.4s cubic-bezier(.22,1,.36,1) both;
    }

    .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-login:active { transform: translateY(0); }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0;
      animation: fadeUp 0.7s 0.45s cubic-bezier(.22,1,.36,1) both;
    }

    .divider span {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .btn-social {
      width: 100%;
      padding: 12px 14px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.2s, border-color 0.2s;
      animation: fadeUp 0.7s 0.5s cubic-bezier(.22,1,.36,1) both;
    }

    .btn-social:hover {
      background: rgba(255,255,255,0.04);
      border-color: rgba(255,255,255,0.14);
    }

    .signup-link {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      margin-top: 22px;
      animation: fadeUp 0.7s 0.55s cubic-bezier(.22,1,.36,1) both;
    }

    .signup-link a {
      color: var(--accent);
      text-decoration: none;
      opacity: 0.8;
      transition: opacity 0.2s;
    }
    .signup-link a:hover { opacity: 1; }

    @media (max-width: 640px) {
      .side-panel { display: none; }
      .login-panel { padding: 36px 28px; }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <!-- Login form -->
    <div class="login-panel">
      <div class="login-header">
        <h1>Welcome back</h1>
        <p>Sign in to continue to your account</p>
      </div>

      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="email">Email</label>
          <div class="input-wrap">
            <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/>
            </svg>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </div>
        </div>

        <div class="form-meta">
          <label class="remember">
            <input type="checkbox" id="remember"/>
            <span class="check-box"></span>
            Remember me
          </label>
          <a href="#" class="forgot">Forgot password?</a>
        </div>

        <button type="submit" class="btn-login">Sign in</button>
      </form>

      <div class="divider"><span>or continue with</span></div>

      <button class="btn-social" onclick="return false;">
        <svg width="16" height="16" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Sign in with Google
      </button>

      <div class="signup-link">
        Don't have an account? <a href="#">Create one</a>
      </div>
    </div>
  </div>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      const btn = e.target.querySelector('.btn-login');
      btn.textContent = 'Signing in…';
      btn.style.opacity = '0.7';
      btn.disabled = true;
      setTimeout(() => {
        btn.textContent = '✓ Signed in';
        btn.style.background = '#4caf80';
      }, 1200);
    }
  </script>
</body>
</html>
